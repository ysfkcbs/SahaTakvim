services:
  - type: web
    name: saha-takvim
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt && flask db upgrade
    startCommand: gunicorn run:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: saha-db
          property: connectionString

databases:
  - name: saha-db
    plan: starter
